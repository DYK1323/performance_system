<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>사업 관리 - 성과관리 플랫폼</title>
<link rel="stylesheet" href="../shared/style.css">
<style>
.new-form { max-width:600px; display:none; margin-top:24px; padding:20px; border:1px solid #e8e8e8; border-radius:6px; background:#fafafa; }
.new-form.open { display:block; }
</style>
</head>
<body>
<div class="shell">
  <div id="gnb"></div>

  <div class="ctx-banner">
    <span class="ctx-current">사업 관리</span>
    <span class="sep">›</span>
    <span>전체 사업 목록</span>
  </div>

  <div class="body">
    <nav class="sidebar" id="sidebar"></nav>

    <div class="content">
      <div class="page-header">
        <h2>전체 사업 목록</h2>
        <span class="page-sub">ownerOrgId 기준 내 사업</span>
        <div class="header-actions">
          <button class="btn btn-sm btn-dark" onclick="toggleNewForm()">+ 새 사업 만들기</button>
        </div>
      </div>

      <!-- 새 사업 생성 폼 (인라인) -->
      <div class="new-form" id="new-form">
        <div class="page-header" style="margin-bottom:14px">
          <h2 style="font-size:14px">새 사업 만들기</h2>
          <div class="header-actions">
            <button class="btn btn-sm btn-ghost" onclick="toggleNewForm()">닫기</button>
          </div>
        </div>
        <div class="info-banner" style="margin-bottom:14px">기본 정보 저장 후 운영본 → 분류 체계 → 지표 순으로 설정하세요.</div>
        <div class="form-grid" style="max-width:100%">
          <div class="fg-label">사업 ID</div>
          <div class="fg-input">
            <input type="text" placeholder="예: prog_2027_plan">
            <div class="hint">영문·숫자·언더스코어만. 생성 후 변경 불가.</div>
          </div>
          <div class="fg-label">사업명 <span class="req">*</span></div>
          <div class="fg-input"><input type="text" placeholder="예: 2027 중장기발전계획"></div>
          <div class="fg-label">설명</div>
          <div class="fg-input"><textarea placeholder="사업 목적 등을 간략히 기술"></textarea></div>
          <div class="fg-label">생성 부서</div>
          <div class="fg-input">
            <input type="text" value="${APP ? APP.user.org : ''}" readonly style="background:#f5f5f5;color:#888">
            <div class="hint">로그인 계정 소속 부서로 자동 설정</div>
          </div>
          <div class="fg-label">운영 주관 부서 <span class="req">*</span></div>
          <div class="fg-input">
            <input type="text" placeholder="부서명 검색">
            <div class="hint">저장 시 이 부서에 program_admin 권한 자동 부여</div>
          </div>
          <div class="fg-label">상태 <span class="req">*</span></div>
          <div class="fg-input">
            <select><option>active - 운영 중</option><option>inactive - 비활성</option></select>
          </div>
        </div>
        <div class="form-actions" style="margin-top:16px">
          <button class="btn btn-dark" onclick="createProgram()">저장하고 운영본 생성 →</button>
          <button class="btn btn-ghost" onclick="toggleNewForm()">취소</button>
        </div>
      </div>

      <!-- 사업 목록 테이블 -->
      <table class="data-table" id="prog-table">
        <thead>
          <tr>
            <th style="width:240px">사업명</th>
            <th>운영 주관 부서</th>
            <th>상태</th>
            <th class="td-r">운영본</th>
            <th>현재 기간</th>
            <th>최근 활동</th>
            <th></th>
          </tr>
        </thead>
        <tbody id="prog-tbody"></tbody>
      </table>
    </div>
  </div>
</div>

<script src="../shared/data.js"></script>
<script src="../shared/layout.js"></script>
<script>
window.PAGE_CONFIG = { role: 'adm', gnbActive: 'programs', sidebar: 'programs' };
initLayout();

// 새 사업 폼의 생성 부서 채우기
document.querySelector('.new-form input[readonly]').value = APP.user.org;

// 사업 목록 렌더링
document.getElementById('prog-tbody').innerHTML = APP.programs.map(p => {
  const isDone = p.status === 'done';
  const dDayBadge = p.dDay ? `<span class="due-label">${p.dDay}</span>` : '';
  return `<tr class="${isDone ? 'row-done' : ''}">
    <td class="td-name" style="${isDone ? 'color:#aaa' : ''}">${p.name}</td>
    <td style="font-size:12px;${isDone ? 'color:#bbb' : ''}">${p.ownerOrg}</td>
    <td>${isDone
      ? '<span class="sb s-empty"><span class="dot"></span>완료</span>'
      : '<span class="sb s-going"><span class="dot"></span>운영 중</span>'}</td>
    <td class="td-r" style="${isDone ? 'color:#bbb' : ''}">${p.versions}</td>
    <td style="font-size:12px;${isDone ? 'color:#bbb' : ''}">${p.period} ${dDayBadge}</td>
    <td style="font-size:11px;color:#999">${p.lastActivity}</td>
    <td>
      <button class="btn btn-sm ${isDone ? 'btn-ghost' : 'btn-dark'}"
        onclick="location.href='program.html?prog=${p.id}'">
        ${isDone ? '조회' : '설정'}
      </button>
    </td>
  </tr>`;
}).join('');

function toggleNewForm() {
  document.getElementById('new-form').classList.toggle('open');
}
function createProgram() {
  alert('저장되었습니다. (프로토타입: 실제 저장 미연결)\n\n다음 단계: 운영본을 생성하세요.');
  location.href = 'program.html?tab=version';
}
</script>
</body>
</html>
