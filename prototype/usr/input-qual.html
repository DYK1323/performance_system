<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>정성 입력 — 성과관리 플랫폼</title>
<link rel="stylesheet" href="../shared/style.css">
</head>
<body>
<div class="shell">
  <div class="gnb">
    <span class="brand">성과관리</span>
    <nav>
      <a href="home.html">내 현황</a>
      <a href="programs.html" class="active">담당 사업</a>
      <a href="pending.html">미입력 항목</a>
    </nav>
    <div class="gnb-right">
      <span class="org-label">기획처 기획조정팀</span>
      <span class="user-label">홍길동</span>
      <span class="role-badge">담당자</span>
    </div>
  </div>
  <div class="ctx-banner">
    <a href="items.html" style="color:#888">지표 목록</a>
    <span class="sep">›</span>
    <span class="ctx-current">교육과정 개선 추진 현황</span>
    <span class="sep">·</span>
    <span>2026년 1차 점검</span>
    <span class="ctx-due">마감 D-2 (04/12 18:00)</span>
  </div>

  <div class="body">
    <div class="content">
      <div class="input-form">
        <div class="input-meta">
          <div class="meta-type">
            <span class="chip chip-qual">정성</span>
            <span style="color:#ddd">·</span>
            <span>수기 판정 (manual_only)</span>
          </div>
          <div class="meta-title">교육과정 개선 추진 현황</div>
          <div class="meta-desc">교육과정 혁신 관련 추진 현황 및 향후 계획을 기술합니다.</div>
          <div class="meta-detail">
            <span><strong>담당</strong> 기획처 기획조정팀</span>
            <span><strong>주기</strong> 분기별</span>
          </div>
        </div>

        <!-- 계획 -->
        <div class="input-section">
          <div class="input-section-title">계획</div>
          <div class="field-row">
            <label style="padding-top:8px">추진 계획 <span class="req">*</span></label>
            <div class="field-wrap">
              <textarea style="min-height:100px">교육과정위원회 심의를 통한 전공 교육과정 개편안 확정 및 2027학년도 적용 준비</textarea>
            </div>
          </div>
        </div>

        <!-- 실적 -->
        <div class="input-section">
          <div class="input-section-title">실적</div>
          <div class="field-row">
            <label style="padding-top:8px">추진 현황 <span class="req">*</span></label>
            <div class="field-wrap">
              <textarea placeholder="실제 추진된 내용을 구체적으로 기술하세요."></textarea>
            </div>
          </div>
          <div class="field-row">
            <label style="padding-top:8px">이슈 / 리스크</label>
            <div class="field-wrap">
              <textarea placeholder="현재 이슈나 위험 요인이 있으면 기술하세요. (선택)" style="min-height:60px"></textarea>
            </div>
          </div>
        </div>

        <!-- 판정 (P4 - 정성은 수기만) -->
        <div class="input-section">
          <div class="input-section-title">판정</div>
          <div class="judgment-row">
            <div class="jcol">
              <div class="jlabel">자동 판정</div>
              <div><span class="sb s-empty" style="color:#ccc;background:#fafafa"><span class="dot" style="background:#e0e0e0"></span>정성 항목 — 해당 없음</span></div>
            </div>
            <div class="jarrow">→</div>
            <div class="jcol">
              <div class="jlabel">수기 판정 <span class="req">*</span></div>
              <select style="width:160px;padding:6px 10px;border:1px solid #d0d0d0;border-radius:3px;font:inherit;font-size:12px">
                <option>— 선택 —</option>
                <option>달성완료</option>
                <option selected>진행중</option>
                <option>미달성예상</option>
                <option>이슈</option>
              </select>
            </div>
            <div class="jarrow">→</div>
            <div class="jcol">
              <div class="jlabel">최종 판정</div>
              <div><span class="sb s-going"><span class="dot"></span>진행중 (수기)</span></div>
            </div>
          </div>
        </div>

        <!-- 증빙 -->
        <div class="input-section">
          <div class="input-section-title">증빙</div>
          <div class="evidence-zone">+ 파일 추가 또는 링크 입력</div>
        </div>

        <!-- 액션바 -->
        <div class="form-actions">
          <button class="btn">임시 저장</button>
          <button class="btn btn-dark" onclick="location.href='saved.html'">최종 저장</button>
          <button class="btn btn-ghost" style="margin-left:auto" onclick="history.back()">← 목록으로</button>
        </div>
      </div>
    </div>
  </div>
</div>
</body>
</html>
