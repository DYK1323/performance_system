<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>정성 입력 - 성과관리 플랫폼</title>
<link rel="stylesheet" href="../shared/style.css">
</head>
<body>
<div class="shell">
  <div class="gnb">
    <span class="brand">성과관리</span>
    <nav>
      <a href="home.html">홈</a>
      <a href="programs.html" class="active">담당 사업</a>
      <a href="pending.html">미입력 항목</a>
    </nav>
    <div class="gnb-right">
      <span class="org-label">기획처 기획조정팀</span>
      <span class="user-label">홍길동</span>
      <span class="role-badge">담당자</span>
    </div>
  </div>

  <div class="ctx-banner">
    <a href="items.html" style="color:#888">지표 목록</a>
    <span class="sep">›</span>
    <span class="ctx-current">교육과정 개선 추진 현황</span>
    <span class="sep">›</span>
    <span>2026년 1차 점검</span>
    <span class="ctx-due">마감 D-2</span>
  </div>

  <div class="body">
    <div class="content">
      <div class="input-form">
        <div class="input-meta">
          <div class="meta-type">
            <span class="chip chip-qual">정성</span>
            <span style="color:#ddd">·</span>
            <span>manual_only</span>
          </div>
          <div class="meta-title">교육과정 개선 추진 현황</div>
          <div class="meta-desc">교육과정 혁신 관련 추진 현황과 다음 단계 계획을 서술하는 정성 항목입니다.</div>
          <div class="meta-detail">
            <span><strong>담당</strong> 기획처 기획조정팀</span>
            <span><strong>주기</strong> 분기별</span>
          </div>
        </div>

        <div class="input-section">
          <div class="input-section-title">계획</div>
          <div class="field-row">
            <label style="padding-top:8px">추진 계획 <span class="req">*</span></label>
            <div class="field-wrap">
              <textarea style="min-height:100px">교육과정위원회 협의를 통한 전공 교육과정 개편안 확정 및 2027학년도 적용 준비</textarea>
            </div>
          </div>
        </div>

        <div class="input-section">
          <div class="input-section-title">실적</div>
          <div class="field-row">
            <label style="padding-top:8px">추진 현황 <span class="req">*</span></label>
            <div class="field-wrap">
              <textarea placeholder="실제 추진된 내용을 구체적으로 기록해 주세요."></textarea>
            </div>
          </div>
          <div class="field-row">
            <label style="padding-top:8px">이슈 / 리스크</label>
            <div class="field-wrap">
              <textarea placeholder="현재 이슈나 위험 요인이 있으면 기록해 주세요." style="min-height:60px"></textarea>
            </div>
          </div>
        </div>

        <div class="input-section">
          <div class="input-section-title">상태 참고</div>
          <div class="judgment-row">
            <div class="jcol">
              <div class="jlabel">자동 판정</div>
              <div><span class="sb s-empty"><span class="dot"></span>정성 항목은 자동판정 없음</span></div>
            </div>
            <div class="jarrow">→</div>
            <div class="jcol">
              <div class="jlabel">현재 표시 상태</div>
              <div><span class="sb s-going"><span class="dot"></span>진행중</span></div>
            </div>
          </div>
        </div>

        <div class="input-section">
          <div class="input-section-title">증빙</div>
          <div class="evidence-zone">파일 선택 또는 링크 입력</div>
        </div>

        <div class="form-actions">
          <button class="btn" onclick="tmpSave()">임시 저장</button>
          <button class="btn btn-dark" onclick="location.href='saved.html'">최종 저장</button>
          <button class="btn btn-ghost" style="margin-left:auto" onclick="history.back()">← 목록으로</button>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
function tmpSave() {
  alert('임시 저장되었습니다. 실제 데이터 저장은 연결되지 않은 프로토타입입니다.');
}
</script>
</body>
</html>
