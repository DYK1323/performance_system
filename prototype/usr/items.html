<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>담당 사업 - 성과관리 플랫폼</title>
<link rel="stylesheet" href="../shared/style.css">
<style>
.tab-panel { display:none; }
.tab-panel.active { display:block; }
</style>
</head>
<body>
<div class="shell">
  <div id="gnb"></div>

  <div class="ctx-banner">
    <span class="ctx-current" id="ctx-section"></span>
    <span class="sep">›</span>
    <span id="ctx-sub"></span>
    <span class="ctx-due" id="ctx-due"></span>
  </div>

  <div class="body">
    <nav class="sidebar" id="sidebar"></nav>

    <div class="content">
      <div class="page-header">
        <h2 id="page-title"></h2>
        <span class="page-sub" id="page-sub"></span>
      </div>

      <!-- ── 담당 사업 목록 ── -->
      <div class="tab-panel" id="panel-programs">
        <table class="data-table" id="prog-tbody-wrap">
          <thead>
            <tr>
              <th style="width:260px">사업명</th>
              <th>운영본</th>
              <th>기간</th>
              <th class="td-r">배당</th>
              <th class="td-r">완료</th>
              <th class="td-r" style="color:#E65100">미입력</th>
              <th style="width:140px">입력률</th>
              <th></th>
            </tr>
          </thead>
          <tbody id="prog-tbody"></tbody>
        </table>
      </div>

      <!-- ── 미입력 항목 ── -->
      <div class="tab-panel" id="panel-pending">
        <div class="inline-banner" style="margin-bottom:12px">
          <span>!</span>
          <strong id="pending-dday"></strong>
          <span>오후 6시까지 입력을 완료해 주세요.</span>
        </div>
        <table class="data-table">
          <thead>
            <tr>
              <th style="width:60px">코드</th>
              <th style="width:260px">항목명</th>
              <th>사업</th>
              <th>유형</th>
              <th>계획값</th>
              <th>마감일</th>
              <th></th>
            </tr>
          </thead>
          <tbody id="pending-tbody"></tbody>
        </table>
      </div>

      <!-- ── 지표 목록 ── -->
      <div class="tab-panel" id="panel-items">
        <table class="data-table">
          <thead>
            <tr>
              <th style="width:56px">코드</th>
              <th style="width:240px">항목명</th>
              <th>유형</th>
              <th>계획값</th>
              <th>실적값</th>
              <th>달성률</th>
              <th>상태</th>
              <th>마감</th>
              <th></th>
            </tr>
          </thead>
          <tbody id="items-tbody"></tbody>
        </table>
      </div>

    </div>
  </div>
</div>

<script src="../shared/data.js"></script>
<script src="../shared/layout.js"></script>
<script>
const TAB = new URLSearchParams(location.search).get('tab') || 'programs';

window.PAGE_CONFIG = {
  role: 'usr',
  gnbActive: TAB === 'pending' ? 'pending' : 'programs',
  sidebar: 'programs',
  tabActive: TAB
};
initLayout();

// ctx-banner
const ctxMap = { programs: '담당 사업', pending: '미입력 항목', items: '지표 목록' };
document.getElementById('ctx-section').textContent = ctxMap[TAB] || TAB;
document.getElementById('ctx-sub').textContent = APP.currentProgram.period;
document.getElementById('ctx-due').textContent = `마감 ${APP.usrStats.dDay}`;
document.getElementById('page-title').textContent = ctxMap[TAB] || '담당 사업';
document.getElementById('page-sub').textContent = `${APP.user.org} · ${APP.currentProgram.period}`;

// activate panel
document.getElementById('panel-' + TAB)?.classList.add('active');

// ── 담당 사업 목록 렌더링
document.getElementById('prog-tbody').innerHTML = APP.usrPrograms.map(p => {
  const isDone = p.pending === 0 && p.dDay === null;
  return `<tr class="${isDone ? 'row-done' : 'row-pend'}">
    <td class="td-name">${p.name}</td>
    <td style="font-size:11px;color:#666">${p.version}</td>
    <td>${p.period}${p.dDay ? ` <span class="due-label">${p.dDay}</span>` : ''}</td>
    <td class="td-r">${isDone ? '—' : p.total}</td>
    <td class="td-r">${isDone ? '—' : p.done}</td>
    <td class="td-r" style="${p.pending > 0 ? 'color:#E65100;font-weight:700' : 'color:#aaa'}">${isDone ? '—' : p.pending}</td>
    <td>${isDone
      ? '<span style="color:#2E7D32;font-size:12px;font-weight:600">완료</span>'
      : `${p.rate}%<div class="pbar"><div class="pbar-fill" style="width:${p.rate}%"></div></div>`}</td>
    <td><button class="btn btn-sm ${isDone ? 'btn-ghost' : 'btn-dark'}"
      onclick="location.href='items.html?tab=items'">${isDone ? '조회' : '입력하기'}</button></td>
  </tr>`;
}).join('');

// ── 미입력 항목 렌더링
document.getElementById('pending-dday').textContent = `마감 ${APP.usrStats.dDay}`;
document.getElementById('pending-tbody').innerHTML = APP.pendingItems.map(item => `
  <tr class="row-pend">
    <td style="color:#999;font-size:11px">${item.code}</td>
    <td class="td-name">${item.name} <span class="due-label">${APP.usrStats.dDay}</span></td>
    <td style="font-size:11px;color:#555">${item.program}</td>
    <td><span class="chip chip-${item.type}">${item.type === 'quant' ? '정량' : '정성'}</span></td>
    <td>${item.plan}</td>
    <td style="color:#E65100;font-size:11px;font-weight:600">${item.dueDate}</td>
    <td><button class="btn btn-sm btn-dark" onclick="location.href='input.html?type=${item.type}&code=${item.code}'">입력</button></td>
  </tr>`).join('');

// ── 지표 목록 렌더링
const statusMap = {
  empty: '<span class="sb s-empty"><span class="dot"></span>미입력</span>',
  warn: '<span class="sb s-warn"><span class="dot"></span>미달성예상</span>',
  done: '<span class="sb s-done"><span class="dot"></span>달성완료</span>'
};
document.getElementById('items-tbody').innerHTML = APP.items.map(item => `
  <tr class="${item.status === 'empty' ? 'row-pend' : ''}">
    <td style="color:#999;font-size:11px">${item.code}</td>
    <td class="td-name">${item.name}${item.status === 'empty' ? ` <span class="due-label">${APP.usrStats.dDay}</span>` : ''}</td>
    <td><span class="chip chip-${item.type}">${item.type === 'quant' ? '정량' : '정성'}</span></td>
    <td>${item.plan}</td>
    <td style="${!item.actual ? 'color:#bbb' : ''}">${item.actual || '-'}</td>
    <td style="${!item.rate ? 'color:#bbb' : ''}">${item.rate || '-'}</td>
    <td>${statusMap[item.status] || ''}</td>
    <td style="${item.status === 'empty' ? 'color:#E65100;font-size:11px;font-weight:600' : 'font-size:11px;color:#999'}">${item.dueDate}</td>
    <td><button class="btn btn-sm ${item.status !== 'empty' ? 'btn-ghost' : 'btn-dark'}"
      onclick="location.href='input.html?type=${item.type}&code=${item.code}'">${item.status !== 'empty' ? '수정' : '입력'}</button></td>
  </tr>`).join('');
</script>
</body>
</html>
